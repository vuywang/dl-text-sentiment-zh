<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}中文文本情感分析系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', path='css/style.css') }}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/">中文情感分析系统</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="切换导航">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">首页</a></li>
                <li class="nav-item"><a class="nav-link {% if request.url.path == '/predict' %}active{% endif %}" href="/predict">单文本分析</a></li>
                <li class="nav-item"><a class="nav-link {% if request.url.path == '/batch' %}active{% endif %}" href="/batch">批量分析</a></li>
                <li class="nav-item"><a class="nav-link {% if request.url.path == '/train' %}active{% endif %}" href="/train">模型训练</a></li>
                <li class="nav-item"><a class="nav-link {% if request.url.path == '/evaluate' %}active{% endif %}" href="/evaluate">模型评估</a></li>
                <li class="nav-item"><a class="nav-link {% if request.url.path == '/history' %}active{% endif %}" href="/history">历史记录</a></li>
            </ul>
        </div>
    </div>
</nav>
<main class="container py-4">
    {% block content %}{% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js"></script>
<script src="{{ url_for('static', path='js/app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
